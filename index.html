<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Photo Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/leaflet.css">
    <link rel="stylesheet" href="css/Leaflet.Photo.css?v=022">
    <link rel="stylesheet" href="css/map.css">
    <link rel="stylesheet" href="css/photo-viewer.css">
    <link rel="stylesheet" href="css/panel-shared.css">
    <link rel="stylesheet" href="css/photo-wall.css">
    <link rel="stylesheet" href="css/landing-page.css">
</head>
<body>
    <!-- Landing page overlay -->
    <div id="landing-page">
        <div class="landing-intro">
            <div class="landing-intro__stat"><em>42</em> days</div>
            <div class="landing-intro__stat"><em>8</em> regions</div>
            <div class="landing-intro__stat"><em>5</em> countries</div>
            <div class="landing-intro__hint">tap or scroll to continue</div>
        </div>
        <div class="landing-grid-wrap">
            <div class="landing-grid"></div>
            <div class="landing-explore-wrap">
                <button class="landing-explore-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                    Explore the Map
                </button>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <!-- Feed sidebar -->
    <button class="feed-toggle" id="feed-toggle" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h12M3 18h18"/></svg>
    </button>
    <div class="feed-sidebar hidden" id="feed-sidebar">
        <div class="feed-header">
            <h3>Trip Feed</h3>
            <button class="region-toggle" id="region-toggle" title="Trip Legs">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            </button>
            <button class="feed-close" id="feed-close">&times;</button>
        </div>
        <div class="region-grid hidden" id="region-grid"></div>
        <div class="itinerary-panel hidden" id="itinerary-panel"></div>
        <div class="feed-entries" id="feed-entries"></div>
    </div>

    <!-- Panel toggle buttons (mobile: switch between panels) -->
    <button class="panel-toggle-btn" id="trip-feed-toggle-btn" data-panel="trip-feed" aria-label="Open trip feed">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h12M3 18h18"/></svg>
        Feed
    </button>
    <button class="panel-toggle-btn photo-wall-reopen-btn" id="photo-wall-reopen-btn" data-panel="photo-wall" aria-label="Open photo wall">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
    </button>
    <button class="panel-toggle-btn" id="region-intro-toggle-btn" data-panel="region-intro" aria-label="Open region intro">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
    </button>

    <!-- Photo wall panel -->
    <div class="photo-wall-panel" id="photo-wall-panel">
        <div class="photo-wall-handle" id="photo-wall-handle">
            <div class="photo-wall-handle-bar"></div>
        </div>
        <div class="photo-wall-header" id="photo-wall-header">
            <span class="photo-wall-title">Photos</span>
            <span class="photo-wall-date-label" id="photo-wall-date-label"></span>
            <button class="photo-wall-collapse-btn" id="photo-wall-collapse-btn" aria-label="Collapse photo wall">↓</button>
            <button class="photo-wall-close-btn" id="photo-wall-close-btn" aria-label="Close photo wall">✕</button>
        </div>
        <div class="photo-wall-scroll" id="photo-wall-scroll">
            <div class="photo-wall-spacer" id="photo-wall-spacer"></div>
        </div>
        <div class="photo-wall-scrubber" id="photo-wall-scrubber">
            <div class="photo-wall-scrubber-thumb" id="photo-wall-scrubber-thumb"></div>
            <div class="photo-wall-scrubber-tooltip" id="photo-wall-scrubber-tooltip"></div>
        </div>
    </div>

    <script src="js/leaflet.js"></script>
    <script src="js/Leaflet.Photo.js"></script>
    <script src="js/dom-helpers.js"></script>

    <script src="js/ViewportSampler.js?v=022"></script>
    <script src="js/route-builder.js"></script>
    <script src="js/app-state.js"></script>
    <script src="js/map-interaction.js"></script>
    <script src="js/photo-viewer.js"></script>
    <script src="js/panel-manager.js"></script>
    <script src="js/photo-wall.js"></script>
    <script src="js/trip-model.js"></script>
    <script src="js/region-nav.js"></script>
    <script src="js/landing-page.js"></script>
    <script src="js/feed-controller.js"></script>
    <script src="js/control-panel.js"></script>
    <script src="js/app.js?v=022"></script>

    <!-- Firebase modules (ES modules, loaded after main app script) -->
    <script type="module" src="js/firebase-init.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/cloud-data.js"></script>
</body>
</html>
